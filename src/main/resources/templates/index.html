<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">Ứng dụng Ghi chú</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .lang-switch a { text-decoration: none; padding: 5px 10px; border: 1px solid #ccc; border-radius: 3px; background-color: #f9f9f9; color: black; margin-left: 5px; font-size: 0.9em;}
        .lang-switch a:hover { background-color: #e9e9e9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px;}
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-danger { color: #721c24; background-color: #f8d7da; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .btn { padding: 5px 10px; text-decoration: none; border: 1px solid #ccc; border-radius: 3px; background-color: #f9f9f9; color: black; }
        .btn-edit { background-color: #ffc107; border-color: #ffc107;}
        .btn-delete { background-color: #dc3545; color: white; border-color: #dc3545;}
        .btn-add { background-color: #28a745; color: white; border-color: #28a745; display: inline-block; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="header-bar">
    <h2 style="margin: 0;" th:text="#{app.owner(${session.ownerName})}">Danh sách của: Ai đó</h2>

    <div class="lang-switch">
        <a th:href="@{''(lang='vi')}">🇻🇳 Tiếng Việt</a>
        <a th:href="@{''(lang='en')}">🇬🇧 English</a>
    </div>
</div>

<div th:if="${message}" class="alert-success" th:text="${message}"></div>
<div th:if="${error}" class="alert-danger" th:text="${error}"></div>

<a th:href="@{/todos/create}" class="btn btn-add" th:text="#{btn.add}">+ Thêm ghi chú mới</a>

<table>
    <thead>
    <tr>
        <th th:text="#{todo.id}">ID</th>
        <th th:text="#{todo.content}">Nội dung</th>
        <th th:text="#{todo.dueDate}">Ngày hết hạn</th>
        <th th:text="#{todo.status}">Trạng thái</th>
        <th th:text="#{todo.priority}">Độ ưu tiên</th>
        <th th:text="#{todo.actions}">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="task : ${todos}">
        <td th:text="${task.id}"></td>
        <td th:text="${task.content}"></td>
        <td th:text="${task.dueDate}"></td>
        <td th:text="${task.status}"></td>
        <td th:text="${task.priority}"></td>
        <td>
            <a class="btn btn-edit" th:href="@{/todos/edit/{id}(id=${task.id})}" th:text="#{btn.edit}">Sửa</a>

            <a class="btn btn-delete" th:href="@{/todos/delete/{id}(id=${task.id})}"
               th:onclick="return confirm([[#{msg.confirmDelete}]]);"
               th:text="#{btn.delete}">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
