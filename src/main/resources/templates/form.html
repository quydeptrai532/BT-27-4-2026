<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${todo.id == null ? 'Thêm Ghi chú' : 'Cập nhật Ghi chú'}">Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .error { color: red; font-size: 0.9em; margin-top: 5px; display: block;}
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="date"], select { width: 300px; padding: 8px; }
        button { padding: 8px 15px; background-color: #007bff; color: white; border: none; cursor: pointer;}
    </style>
</head>
<body>
<h2 th:text="${todo.id == null ? 'Thêm Ghi chú mới' : 'Cập nhật Ghi chú'}">Form</h2>

<form th:action="@{/todos/save}" th:object="${todo}" method="post">

    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
        <label>Nội dung công việc:</label><br>
        <input type="text" th:field="*{content}" />
        <span class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
    </div>

    <div class="form-group">
        <label>Ngày hết hạn:</label><br>
        <input type="date" th:field="*{dueDate}" />
        <span class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></span>
    </div>

    <div class="form-group">
        <label>Trạng thái:</label><br>
        <select th:field="*{status}">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
        </select>
    </div>

    <div class="form-group">
        <label>Độ ưu tiên:</label><br>
        <select th:field="*{priority}">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>
    </div>

    <button type="submit">Lưu công việc</button>
    <a th:href="@{/todos}">Hủy bỏ</a>
</form>
</body>
</html>
